<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>الطيبات</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <button class="menu-btn">☰</button>
            <h1>الطيبات</h1>
            <button class="new-chat-btn" id="newChatBtn">✏️</button>
        </div>

        <!-- منطقة المحادثة -->
        <div id="chatBox" class="chat-box">
            <div class="welcome-msg">
                <div class="avatar">🌙</div>
                <p>أهلاً بك في الطيبات! كيف يمكنني مساعدتك اليوم؟</p>
            </div>
        </div>

        <!-- منطقة الإدخال -->
        <div class="input-area">
            <div class="input-box">
                <button class="mic-btn" id="micBtn">🎤</button>
                <input type="text" id="userInput" placeholder="اكتب رسالتك هنا..." />
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
            <div class="input-actions">
                <button class="action-btn" id="camBtn">📷 كاميرا</button>
                <button class="action-btn" id="fileBtn">📎 ملف</button>
            </div>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
