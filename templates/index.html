<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الطيبات</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
body { background: linear-gradient(145deg, #0b1120, #1a2332); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 12px; }
.container { width: 100%; max-width: 480px; height: 95vh; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 40px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 30px 60px rgba(0,0,0,0.7); display: flex; flex-direction: column; overflow: hidden; padding: 20px 16px 16px; }
.header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.header h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(to right, #c084fc, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.new-chat-btn { background: rgba(255,255,255,0.06); border: none; color: #d1d5db; font-size: 1.2rem; padding: 8px 12px; border-radius: 30px; cursor: pointer; }
.chat-box { flex: 1; overflow-y: auto; padding: 16px 4px 8px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
.welcome-msg { text-align: center; color: #9ca3af; margin-top: 40px; }
.welcome-msg .avatar { font-size: 4rem; margin-bottom: 12px; }
.welcome-msg p { font-size: 1.1rem; background: rgba(255,255,255,0.04); padding: 16px 20px; border-radius: 30px; display: inline-block; }
.msg { max-width: 85%; padding: 14px 18px; border-radius: 24px; font-size: 1rem; line-height: 1.6; word-wrap: break-word; }
.user-msg { align-self: flex-end; background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; border-bottom-right-radius: 6px; }
.bot-msg { align-self: flex-start; background: rgba(255,255,255,0.07); color: #e5e7eb; border-bottom-left-radius: 6px; border: 1px solid rgba(255,255,255,0.05); }
.bot-msg strong { color: #c084fc; }
.input-area { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
.input-box { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.06); border-radius: 50px; padding: 4px 6px 4px 16px; border: 1px solid rgba(255,255,255,0.08); }
.input-box input { flex: 1; background: transparent; border: none; outline: none; color: #f3f4f6; font-size: 1rem; padding: 12px 0; }
.input-box input::placeholder { color: #6b7280; }
.send-btn { background: linear-gradient(135deg, #7c3aed, #4f46e5); border: none; color: #fff; font-size: 1.3rem; padding: 12px 18px; border-radius: 50px; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>الطيبات</h1>
    <button class="new-chat-btn" onclick="newChat()">✏️</button>
  </div>
  <div class="chat-box" id="chatBox">
    <div class="welcome-msg">
      <div class="avatar">🌙</div>
      <p>أهلاً بك في الطيبات! كيف يمكنني مساعدتك اليوم؟</p>
    </div>
  </div>
  <div class="input-area">
    <div class="input-box">
      <input type="text" id="userInput" placeholder="اكتب رسالتك هنا...">
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>
<script>
const chatBox = document.getElementById("chatBox");
const userInput = document.getElementById("userInput");
let history = [];

function parseMarkdown(text) {
  return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
}

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "msg " + (sender === "user" ? "user-msg" : "bot-msg");
  if (sender === "bot") div.innerHTML = parseMarkdown(text);
  else div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;
  addMessage(text, "user");
  userInput.value = "";
  const loading = document.createElement("div");
  loading.className = "msg bot-msg";
  loading.textContent = "⏳ جاري التفكير...";
  chatBox.appendChild(loading);
  chatBox.scrollTop = chatBox.scrollHeight;
  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history })
    });
    const data = await res.json();
    loading.innerHTML = parseMarkdown(data.response);
    history.push({ role: "user", content: text });
    history.push({ role: "assistant", content: data.response });
  } catch {
    loading.textContent = "❌ حدث خطأ في الاتصال";
  }
}

function newChat() {
  chatBox.innerHTML = '<div class="welcome-msg"><div class="avatar">🌙</div><p>أهلاً بك في الطيبات! كيف يمكنني مساعدتك اليوم؟</p></div>';
  history = [];
}

userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>
</body>
</html>
