<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>الطيبات</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: #161b22; border-bottom: 1px solid #30363d; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #7c3aed, #c084fc); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.logo-text { font-size: 1.3rem; font-weight: 700; background: linear-gradient(to right, #c084fc, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.new-chat { background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); color: #c084fc; padding: 7px 14px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
.new-chat:hover { background: rgba(124,58,237,0.3); }
.chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
.chat-box::-webkit-scrollbar { width: 4px; }
.chat-box::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; color: #8b949e; }
.welcome-icon { font-size: 5rem; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.05)} }
.welcome h2 { font-size: 1.5rem; color: #c084fc; }
.welcome p { font-size: 0.95rem; text-align: center; max-width: 300px; line-height: 1.6; }
.msg-wrapper { display: flex; flex-direction: column; gap: 4px; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.7; word-wrap: break-word; }
.user-msg { align-self: flex-end; background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; border-bottom-right-radius: 4px; }
.bot-msg { align-self: flex-start; background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-bottom-left-radius: 4px; }
.bot-msg strong { color: #c084fc; }
.bot-msg code { background: #0d1117; padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #79c0ff; }
.typing { display: flex; gap: 4px; align-items: center; padding: 14px 18px; }
.typing span { width: 8px; height: 8px; background: #8b949e; border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)} }
.input-area { padding: 14px 16px; background: #161b22; border-top: 1px solid #30363d; }
.input-box { display: flex; align-items: center; gap: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 28px; padding: 8px 8px 8px 16px; transition: 0.3s; }
.input-box:focus-within { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
.input-box input { flex: 1; background: transparent; border: none; outline: none; color: #e6edf3; font-size: 0.95rem; padding: 6px 0; }
.input-box input::placeholder { color: #484f58; }
.icon-btn { background: none; border: none; color: #8b949e; font-size: 1.2rem; cursor: pointer; padding: 8px; border-radius: 50%; transition: 0.3s; }
.icon-btn:hover { background: #21262d; color: #c084fc; }
.send-btn { background: linear-gradient(135deg, #7c3aed, #4f46e5); border: none; color: #fff; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: 0.3s; flex-shrink: 0; }
.send-btn:hover { transform: scale(1.08); box-shadow: 0 0 15px rgba(124,58,237,0.4); }
.suggestions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.suggestion { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
.suggestion:hover { border-color: #7c3aed; color: #c084fc; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-icon">🌙</div>
    <span class="logo-text">الطيبات</span>
  </div>
  <button class="new-chat" onclick="newChat()">✏️ محادثة جديدة</button>
</div>
<div class="chat-box" id="chatBox">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🌙</div>
    <h2>مرحباً بك في الطيبات</h2>
    <p>مساعدك الذكي — اسألني عن أي شيء، الطقس، الأسعار، الأخبار، أو أي موضوع يخطر ببالك!</p>
  </div>
</div>
<div class="input-area">
  <div class="suggestions" id="suggestions">
    <span class="suggestion" onclick="suggest(this)">🌤️ الطقس اليوم</span>
    <span class="suggestion" onclick="suggest(this)">💵 سعر الدولار</span>
    <span class="suggestion" onclick="suggest(this)">📰 آخر الأخبار</span>
    <span class="suggestion" onclick="suggest(this)">😄 نكتة</span>
  </div>
  <div class="input-box">
    <button class="icon-btn" onclick="alert('قريباً 🎤')">🎤</button>
    <input type="text" id="userInput" placeholder="اكتب رسالتك...">
    <button class="icon-btn" onclick="alert('قريباً 📷')">📷</button>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>
<script>
const chatBox = document.getElementById("chatBox");
const userInput = document.getElementById("userInput");
const welcome = document.getElementById("welcome");
const suggestions = document.getElementById("suggestions");
let history = [];

function parseMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

function addMessage(text, sender) {
  if (welcome) welcome.style.display = "none";
  if (suggestions) suggestions.style.display = "none";
  const wrapper = document.createElement("div");
  wrapper.className = "msg-wrapper";
  const div = document.createElement("div");
  div.className = "msg " + (sender === "user" ? "user-msg" : "bot-msg");
  if (sender === "bot") div.innerHTML = parseMarkdown(text);
  else div.textContent = text;
  wrapper.appendChild(div);
  chatBox.appendChild(wrapper);
  chatBox.scrollTop = chatBox.scrollHeight;
  return div;
}

function showTyping() {
  if (welcome) welcome.style.display = "none";
  const wrapper = document.createElement("div");
  wrapper.className = "msg-wrapper";
  wrapper.id = "typingIndicator";
  const div = document.createElement("div");
  div.className = "msg bot-msg typing";
  div.innerHTML = "<span></span><span></span><span></span>";
  wrapper.appendChild(div);
  chatBox.appendChild(wrapper);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typingIndicator");
  if (t) t.remove();
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;
  addMessage(text, "user");
  userInput.value = "";
  showTyping();
  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history })
    });
    const data = await res.json();
    removeTyping();
    addMessage(data.response, "bot");
    history.push({ role: "user", content: text });
    history.push({ role: "assistant", content: data.response });
  } catch {
    removeTyping();
    addMessage("❌ حدث خطأ في الاتصال، حاول مرة أخرى", "bot");
  }
}

function newChat() {
  chatBox.innerHTML = '';
  chatBox.appendChild(welcome);
  chatBox.appendChild(suggestions);
  welcome.style.display = "flex";
  suggestions.style.display = "flex";
  history = [];
}

function suggest(el) {
  userInput.value = el.textContent.replace(/^[^\w\u0600-\u06FF]+/, '').trim();
  sendMessage();
}

userInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
